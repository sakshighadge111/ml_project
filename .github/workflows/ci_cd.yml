name: CI/CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  test:

    name: Run Tests

    runs-on: ubuntu-latest

    services:

      mysql:
        image: mysql:8.0

        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: shopper_db1

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      postgres:
        image: postgres:15

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 1234
          POSTGRES_DB: shoppers_warehouse

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create ML Directory
        run: mkdir -p ml

      - name: Run ETL and Train Model

        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: shopper_db1

          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          PG_USER: postgres
          PG_PASSWORD: 1234
          PG_NAME: shoppers_warehouse

          MODEL_PATH: ./ml/best_model.pkl
          MLFLOW_TRACKING_URI: ./mlruns

        run: |
          python data/reload_data.py
          python etl/load.py
          python ml/preprocess.py
          python ml/train.py

      - name: Run API Tests

        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: shopper_db1

          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          PG_USER: postgres
          PG_PASSWORD: 1234
          PG_NAME: shoppers_warehouse

          MODEL_PATH: ./ml/best_model.pkl
          MLFLOW_TRACKING_URI: ./mlruns

        run: |
          python tests/test_api.py -v

  build-and-push:

    name: Build and Push Docker Image

    runs-on: ubuntu-latest

    needs: test

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5

        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/shoppers-ml:latest